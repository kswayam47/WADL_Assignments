<div class="register-container">
  <h2>User Registration</h2>
  <form (ngSubmit)="register()" #registerForm="ngForm">
    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" [(ngModel)]="user.name" required placeholder="Enter your name">
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" [(ngModel)]="user.email" required placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label for="year">Year:</label>
      <input type="text" id="year" name="year" [(ngModel)]="user.year" required
        placeholder="Enter your year (e.g. TE, BE)">
    </div>

    <div class="form-group">
      <label for="department">Department:</label>
      <input type="text" id="department" name="department" [(ngModel)]="user.department" required
        placeholder="Enter your department">
    </div>

    <div class="form-group">
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" [(ngModel)]="user.password" required
        placeholder="Enter your password">
    </div>

    <button type="submit" [disabled]="!registerForm.form.valid">Register</button>
  </form>
  <p>Already have an account? <a routerLink="/">Login</a></p>
</div>
